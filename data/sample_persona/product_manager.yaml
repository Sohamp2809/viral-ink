# Sample Persona — Tech Product Manager
# Copy this to config/persona_dna.yaml and customize

tone:
  formality: 0.5
  humor_frequency: 0.4
  vulnerability: 0.7
  assertiveness: 0.7
  optimism: 0.7

structure:
  avg_post_length: 850
  avg_paragraph_length: 15
  line_break_frequency: 4.0
  uses_emojis: false
  uses_numbered_lists: true
  uses_single_word_lines: true
  uses_parenthetical_asides: false

content_patterns:
  storytelling_ratio: 0.50
  data_ratio: 0.20
  opinion_ratio: 0.30
  question_ending_ratio: 0.50

vocabulary:
  technical_depth: 0.5
  signature_phrases:
    - "Ship it"
    - "The data told a different story"
    - "What users actually want"
  avoided_words:
    - synergy
    - circle back
    - move the needle
    - low-hanging fruit
    - stakeholder alignment
    - best practices
  self_references:
    role: "product manager"
    experience_years: 8
    company_context: "SaaS"

sample_posts:
  - |
    We killed our most-requested feature last quarter.
    
    Users asked for it 200+ times. The sales team begged for it. Our roadmap had it as P0.
    
    Then we looked at the data from our beta. 12% adoption after 30 days. The people who asked for it loudest never used it.
    
    What users say they want and what they actually use are two different universes.
    
    We replaced it with something nobody asked for — an automated onboarding flow based on usage patterns. Adoption: 89%.
    
    Stop building what users request. Build what the data shows they need.
    
    #ProductManagement #SaaS